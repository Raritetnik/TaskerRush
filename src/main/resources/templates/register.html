<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create account | TaskerRush</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          th:href="@{/css/login.css}">
</head>

<body>

<div class="background"></div>

<main class="login-container">
    <section class="login-card">

        <div class="logo">
            <i class="bi bi-check2-square"></i>
        </div>

        <h1>Create account</h1>

        <p class="subtitle">
            Start organizing your projects and tasks
        </p>

        <div class="alert alert-error"
             th:if="${registrationError}">
            <i class="bi bi-exclamation-circle"></i>

            <span th:text="${registrationError}">
                Unable to create account.
            </span>
        </div>

        <form th:action="@{/register}"
              th:object="${registerForm}"
              method="post"
              id="registerForm">

            <div class="input-group">
                <label for="registerName">
                    Full name
                </label>

                <div class="input-wrapper">
                    <i class="bi bi-person"></i>

                    <input id="registerName"
                           type="text"
                           th:field="*{full_name}"
                           placeholder="John Doe"
                           maxlength="100"
                           autocomplete="full_name"
                           required>
                </div>

                <span class="field-error"
                      th:if="${#fields.hasErrors('full_name')}"
                      th:errors="*{full_name}">
                    Name error
                </span>
            </div>

            <div class="input-group">
                <label for="registerEmail">
                    Email address
                </label>

                <div class="input-wrapper">
                    <i class="bi bi-envelope"></i>

                    <input id="registerEmail"
                           type="email"
                           th:field="*{email}"
                           placeholder="john@example.com"
                           maxlength="150"
                           autocomplete="email"
                           required>
                </div>

                <span class="field-error"
                      th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}">
                    Email error
                </span>
            </div>

            <div class="input-group">
                <label for="registerUsername">
                    Username
                </label>

                <div class="input-wrapper">
                    <i class="bi bi-person"></i>

                    <input id="registerUsername"
                           type="text"
                           th:field="*{username}"
                           placeholder="john.doe"
                           maxlength="100"
                           autocomplete="username"
                           required>
                </div>

                <span class="field-error"
                      th:if="${#fields.hasErrors('username')}"
                      th:errors="*{username}">
                    Username error
                </span>
            </div>

            <div class="input-group">
                <label for="registerPassword">
                    Password
                </label>

                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>

                    <input id="registerPassword"
                           type="password"
                           th:field="*{password}"
                           placeholder="Create a password"
                           minlength="8"
                           maxlength="72"
                           autocomplete="new-password"
                           required>

                    <button type="button"
                            class="toggle-password"
                            data-password-target="registerPassword"
                            aria-label="Show password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>

                <span class="field-error"
                      th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}">
                    Password error
                </span>
            </div>

            <div class="input-group">
                <label for="confirmPassword">
                    Confirm password
                </label>

                <div class="input-wrapper">
                    <i class="bi bi-shield-lock"></i>

                    <input id="confirmPassword"
                           type="password"
                           th:field="*{confirmPassword}"
                           placeholder="Repeat your password"
                           minlength="8"
                           maxlength="72"
                           autocomplete="new-password"
                           required>

                    <button type="button"
                            class="toggle-password"
                            data-password-target="confirmPassword"
                            aria-label="Show password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>

                <span class="field-error"
                      th:if="${#fields.hasErrors('confirmPassword')}"
                      th:errors="*{confirmPassword}">
                    Password confirmation error
                </span>
            </div>

            <button class="login-button"
                    id="registerButton"
                    type="submit">

                <span class="button-text">
                    <i class="bi bi-person-plus"></i>
                    Create account
                </span>

                <span class="button-loading" style="display: none">
                    <i class="bi bi-arrow-repeat loading-icon"></i>
                    Creating account...
                </span>
            </button>

        </form>

        <div class="register">
            Already have an account?

            <a th:href="@{/login}">
                Sign in
            </a>
        </div>

    </section>
</main>
<script th:src="@{/js/register.js}"></script>
</body>
</html>
