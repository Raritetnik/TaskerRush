services:
  database:
    image: postgres:17-alpine
    container_name: tasker-rush-database

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - tasker-rush-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: tasker-rush-app

    ports:
      - "8080:8080"

    environment:
      SERVER_PORT: 8080

      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: 60

      SESSION_TIMEOUT: 30m
      SECURITY_LOG_LEVEL: INFO

    depends_on:
      database:
        condition: service_healthy

    restart: unless-stopped

volumes:
  tasker-rush-postgres-data: